services:
  nginx1:
    image: nginx:1.27-alpine
    container_name: nginx1
    ports:
      - "8081:80"
    volumes:
      - ./nginx/nginx1.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx2
    networks:
      - xffnet

  nginx2:
    image: nginx:1.27-alpine
    container_name: nginx2
    ports:
      - "8082:80"
    volumes:
      - ./nginx/nginx2.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx3
    networks:
      - xffnet

  nginx3:
    image: nginx:1.27-alpine
    container_name: nginx3
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx3.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - xffnet

  app:
    build:
      context: ./app
    container_name: app
    expose:
      - "8000"
    networks:
      - xffnet

networks:
  xffnet:
    driver: bridge